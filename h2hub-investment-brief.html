            'font-weight:500',
            'text-decoration:none',
            'cursor:pointer',
            'transition:all 0.2s ease',
            'white-space:nowrap',
            'line-height:1.4'
          ].join(';');
          
          var OPEN_STYLE = BASE + ';background:rgba(0,168,150,0.08);border:1px solid rgba(0,168,150,0.35);color:#00A896;';
          var RUN_STYLE  = BASE + ';background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.35);color:#818cf8;';
          
          function btn(href, label, svg, style) {
            var a = document.createElement('a');
            a.href = href; a.target = '_blank'; a.rel = 'noopener noreferrer';
            a.setAttribute('style', style);
            a.innerHTML = svg + ' ' + label;
            a.addEventListener('mouseenter', function(){this.style.opacity='0.8';});
            a.addEventListener('mouseleave', function(){this.style.opacity='1';});
            return a;
          }
          
          function openBtn(repo, label) {
            return btn(GH + repo, label || 'Open Model', GH_SVG, OPEN_STYLE);
          }
          function runBtn(repo, label, externalUrl) {
            var url = externalUrl ? externalUrl : GH + repo + '#usage';
            return btn(url, label || 'Run Model', RUN_SVG, RUN_STYLE);
          }
          
          // Inject button group into a tech card matched by keywords
          function addToCard(keywords, btns) {
            document.querySelectorAll('#h2hub08550c32 .tech-card').forEach(function(card) {
              if (card.querySelector('a[href*="ecoprius"]')) return;
              var txt = card.textContent;
              if (!keywords.some(function(k){ return txt.indexOf(k) !== -1; })) return;
              var links = card.querySelector('.tc-links');
              if (!links) return;
              var row = document.createElement('div');
              row.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07);';
              btns.forEach(function(b){ row.appendChild(b); });
              links.appendChild(row);
            });
          }
          
          // Inject into section page
          function addToPage(selectors, btns, position) {
            var el = null;
            selectors.forEach(function(s){ if(!el) el = document.querySelector('#h2hub08550c32 ' + s); });
            if (!el || el.querySelector('a[href*="ecoprius"]')) return;
            var row = document.createElement('div');
            row.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin:0.6rem 0 1.2rem;';
            btns.forEach(function(b){ row.appendChild(b); });
            if (position === 'prepend') {
              el.insertBefore(row, el.firstChild);
            } else {
              var hdr = el.querySelector('.page-header, h2, .dp-h3');
              if (hdr) hdr.after(row); else el.insertBefore(row, el.firstChild);
            }
          }
          
          // ── Technology cards ────────────────────────────────────────────
          addToCard(
            ['PEM Electroly','Bosch PEM','37.5 MW'],
            [openBtn('h2hub-pem-electrolyser-model'), runBtn('h2hub-pem-electrolyser-model')]
          );
          addToCard(
            ['Stornetic','Flywheel','DuraStor'],
            [openBtn('h2hub-stornetic-flywheel-dynamics'), runBtn('h2hub-stornetic-flywheel-dynamics')]
          );
          addToCard(
            ['Nidec','Grid-Forming Inverter'],
            [openBtn('h2hub-nidec-grid-forming-inverter'), runBtn('h2hub-nidec-grid-forming-inverter')]
          );
          addToCard(
            ['Linde','LH₂','LH2 +','Fleet'],
            [openBtn('h2hub-linde-lh2-fleet-model'), openBtn('h2hub-linde-lh2-production','LH₂ Production'), openBtn('h2hub-hydrogen-refueling-hub','Refueling Hub')]
          );
          addToCard(
            ['Port Operations','Forklifts','13 MW'],
            [openBtn('h2hub-port-microgrid-load-flow'), runBtn('h2hub-port-microgrid-load-flow')]
          );
          addToCard(
            ['KPP','Kinetic Power','50 MW Continuous'],
            [openBtn('Energy-Hydrogen-HUB', 'Main HUB')]
          );
          
          // ── Financial page ──────────────────────────────────────────────
          setTimeout(function(){
            addToPage(
              ['.fin-page'],
              [openBtn('h2hub-financial-model'), runBtn('h2hub-financial-model','Run NPV/IRR')],
              'header'
            );
          }, 100);
          
          // ── CO2 page - below api controls ──────────────────────────────
          setTimeout(function(){
            var co2 = document.querySelector('#h2hub08550c32 .co2-page');
            if (!co2 || co2.querySelector('a[href*="ecoprius"]')) return;
            var anchor = co2.querySelector('.co2-api-row, .co2-ctrl, .co2-note');
            if (!anchor) return;
            var row = document.createElement('div');
            row.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin:0.8rem 0 0.6rem;';
            row.appendChild(openBtn('h2hub-co2-emissions-model'));
            row.appendChild(runBtn('h2hub-co2-emissions-model','Run CO₂ Calc', STREAMLIT_CO2));
            anchor.after(row);
          }, 150);
          
          // ── Development Plan ────────────────────────────────────────────
          setTimeout(function(){
            addToPage(
              ['.dp-page'],
              [openBtn('h2hub-development-plan-model'), openBtn('Energy-Hydrogen-HUB','Main HUB')],
              'header'
            );
          }, 150);
          
          // ── System Architecture / Overview ──────────────────────────────
          setTimeout(function(){
            var hero = document.querySelector('#h2hub08550c32 .hero-content');
            if (!hero || hero.querySelector('a[href*="ecoprius"]')) return;
            var kpis = hero.querySelector('.hero-kpis');
            var row = document.createElement('div');
            row.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin:1rem 0 0;';
            row.appendChild(openBtn('h2hub-system-architecture-model','System Architecture'));
            row.appendChild(openBtn('Energy-Hydrogen-HUB','Main HUB Repo'));
            if (kpis) kpis.after(row); else hero.appendChild(row);
          }, 200);
          
        }, 700);
        
        // ── Retry for late-rendered cards ─────────────────────────────────
        setTimeout(function retryCards() {
          var GH = 'https://github.com/ecoprius/';
          var GH_SVG = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>';
          var map = [
            {k:['PEM Electroly','37.5 MW'],    r:'h2hub-pem-electrolyser-model'},
            {k:['Stornetic','Flywheel'],        r:'h2hub-stornetic-flywheel-dynamics'},
            {k:['Nidec','Grid-Forming'],        r:'h2hub-nidec-grid-forming-inverter'},
            {k:['Linde','LH₂'],               r:'h2hub-linde-lh2-fleet-model'},
            {k:['Port Operations','Forklifts'], r:'h2hub-port-microgrid-load-flow'},
          ];
          map.forEach(function(m){
            document.querySelectorAll('#h2hub08550c32 .tech-card').forEach(function(card){
              if (card.querySelector('a[href*="ecoprius"]')) return;
              if (!m.k.some(function(k){return card.textContent.indexOf(k)!==-1;})) return;
              var links = card.querySelector('.tc-links');
              if (!links) return;
              var row = document.createElement('div');
              row.style.cssText='display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07);';
              var a = document.createElement('a');
              a.href=GH+m.r; a.target='_blank'; a.rel='noopener noreferrer';
              a.style.cssText='display:inline-flex;align-items:center;gap:6px;background:rgba(0,168,150,0.08);border:1px solid rgba(0,168,150,0.35);border-radius:8px;padding:6px 14px;font-family:DM Sans,sans-serif;font-size:0.75rem;font-weight:500;color:#00A896;text-decoration:none;';
              a.innerHTML=GH_SVG+' Open Model';
              row.appendChild(a); links.appendChild(row);
            });
          });
        }, 2200);
        
                // 2. Gantt: shift Q1→Q2 2026
        setTimeout(function fixGantt(){
          document.querySelectorAll('#h2hub08550c32 svg text').forEach(function(el){
            var t=el.textContent;
            if(/^Q1[\s·]/.test(t)) el.textContent=t.replace('Q1','Q2 2026');
            else if(/^Q2[\s·]/.test(t)) el.textContent=t.replace('Q2','Q3 2026');
            else if(/^Q3[\s·]/.test(t)) el.textContent=t.replace('Q3','Q4 2026');
            else if(/^Q4/.test(t)||/Q4-H1/.test(t)) el.textContent=t.replace('Q4-H1','H1 2027').replace('Q4','H1 2027');
          });
        },300);
        setTimeout(function fixGantt(){
          document.querySelectorAll('#h2hub08550c32 svg text').forEach(function(el){
            var t=el.textContent;
            if(/^Q1[\s·]/.test(t)) el.textContent=t.replace('Q1','Q2 2026');
            else if(/^Q2[\s·]/.test(t)) el.textContent=t.replace('Q2','Q3 2026');
            else if(/^Q3[\s·]/.test(t)) el.textContent=t.replace('Q3','Q4 2026');
            else if(/^Q4/.test(t)||/Q4-H1/.test(t)) el.textContent=t.replace('Q4-H1','H1 2027').replace('Q4','H1 2027');
          });
        },1200);

        // 3. Tab click handler
        document.addEventListener('click', function(e){
          var tab=e.target.closest&&e.target.closest('.mtab');
          if(!tab) return;
          var isVideo=tab.textContent.toLowerCase().indexOf('video')!==-1;
          setTimeout(function(){
            var ac=document.querySelector('#h2hub08550c32 .modal-tab-content.active');
            if(!ac) return;
            if(isVideo){
              // Video tab: restore all video elements
              ac.querySelectorAll('.video-wrap,.yt-lite,.vimeo-container,.video-grid').forEach(function(el){
                el.style.removeProperty('display');
              });
            } else {
              // Desc/Calc tabs: hide video, force single column
              ac.querySelectorAll('.video-wrap,.yt-lite,.vimeo-container,.video-grid').forEach(function(el){
                el.style.setProperty('display','none','important');
              });
              ac.querySelectorAll('*').forEach(function(el){
                try{
                  var cs=window.getComputedStyle(el);
                  if(cs.display==='flex'){el.style.setProperty('flex-direction','column','important');el.style.setProperty('width','100%','important');}
                  if(cs.display==='grid'){el.style.setProperty('grid-template-columns','1fr','important');el.style.setProperty('width','100%','important');}
                }catch(x){}
                el.style.setProperty('max-width','100%','important');
                el.style.setProperty('box-sizing','border-box','important');
              });
            }
          },60);
        },true);
        app.querySelectorAll("script").forEach(function(old){
          var ns=document.createElement("script");
          Array.from(old.attributes).forEach(function(a){ns.setAttribute(a.name,a.value);});
          ns.textContent=old.textContent;
          old.parentNode.replaceChild(ns,old);
        });
      }
      // ── Decrypt animation: 3 second sequence ──
      // animation handled by loading screen
      // After 3 seconds: hide loading, reveal app with fade
      setTimeout(function(){
        // handled
        setTimeout(function(){
          var ldr=$q("#loading-h2hub08550c32");
          if(ldr)ldr.style.display="none";
          if(gate)gate.style.display="none";
          if(app){
            app.style.display="block";
            app.style.opacity="0";
            app.style.transition="opacity 0.6s ease";
            requestAnimationFrame(function(){
              requestAnimationFrame(function(){
                app.style.opacity="1";
              });
            });
          }
        },400);
      },3000);
    }).catch(function(e){
      var ldr=$q("#loading-h2hub08550c32"),box=$q(".h2hub-gate-box");
      if(ldr)ldr.style.display="none";var _gd2=ROOT.querySelector("#gate-h2hub08550c32");if(_gd2)_gd2.style.display="";if(box)box.style.display="";
      showErr("DECRYPTION ERROR: "+e.message);
    });
  }
  var inp=ROOT?ROOT.querySelector("#pw-h2hub08550c32"):null;
  if(inp)inp.addEventListener("keydown",function(e){if(e.key==="Enter")tryUnlock();});
  window["h2hub_h2hub08550c32"]=tryUnlock;
})();
</script>
